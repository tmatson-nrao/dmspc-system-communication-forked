{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django App{% endblock %}</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GTVe1R+6qngP2F9tchZCLmmrZ6+6VzAhJxYyns9i4VU2pUmAmNqE1D5xgOjg1z+5" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'ngRadar_Website/css/style.css' %}">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <!-- Child templates inject content here -->
        {% block content %}{% endblock %} 
    </div>

    <!-- Bootstrap JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-pYjNprf3qz3zUu5D8QB3UywJ33mElegVx1j5R0dAC/aLCSktQ13S0iVh0EEF8R5G" crossorigin="anonymous"></script>
</body>
</html>
