<div class="mt-4 border rounded pt-3 pb-3 bg-white ps-3 pe-3 text-center mx-auto"
style="max-width: 50rem;">
        <h5 class="fw-bold">Latest DDM:</h5>
          {% if dsoc_event %}
                  <img
                      src="{% url 'serve_image' dsoc_event.uuid %}"
                      class="img-fluid mx-auto d-block"
                      alt="Latest DDM">
              {% else %}
                  <p class="text-muted">No image available</p>
              {% endif %}
</div>
