<div class="mt-4 border rounded pt-3 pb-3 bg-white ps-3 pe-3 text-center mx-auto"
style="max-width: 50rem;">
    {% if dsoc_event %}
        <h5 class="fw-bold">DDM last updated at {{ dsoc_event.event_time|date:"F d Y H:i:s" }}</h5>
         <img src="{% url 'serve_image' dsoc_event.uuid %}" alt="DDM generated by DSOC">
    {% else %}
        <h5 class="fw-bold">Waiting for DDM to be created...</h5>
        <p class="text-muted mt-5">No image available yet</p>
    {% endif %}
</div>
