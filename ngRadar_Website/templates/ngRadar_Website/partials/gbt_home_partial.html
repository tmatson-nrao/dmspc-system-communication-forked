<div class="container mt-5">
  <div class="row g-4">
    <!-- Left column -->
    <div class="col-12 col-md-6">
      <div class="border rounded p-3 bg-white">
        <h5 class="mb-2">Target:</h5>
        <p class="mb-0"> {{ gbt_event.target }} </p>
      </div>

      <div class="border rounded p-3 bg-white mt-4">
        <h5 class="mb-2">Object ID:</h5>
        <p class="mb-0"> {{ gbt_event.object_id }} </p>
      </div>
      
      <div class="border rounded p-3 bg-white mt-4">
        <h5 class="mb-2">Message Time (UTC):</h5>
        <p class="mb-0"> {{ gbt_event.event_time|date:"F d Y H:i:s" }} </p>
      </div>

      <!-- add more rows as needed -->
    </div>

    <!-- Right column -->
    <div class="col-12 col-md-6">
      <div class="border rounded p-3 bg-white">
        <h5 class="mb-2">Transmitted Waveform:</h5>
        <p class="mb-0">{{ gbt_event.tx_waveform }}</p>
      </div>

      <div class="border rounded p-3 bg-white mt-4">
        <h5 class="mb-2">Recorded Waveform:</h5>
        <p class="mb-0"> {{ gbt_event.rec_waveform }} </p>
      </div>

      <!-- add more rows as needed -->
    </div>
  </div>
</div>
