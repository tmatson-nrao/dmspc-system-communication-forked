{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}System Communication Web App{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ngRadar_Website/css/global.css' %}">
  <link rel="stylesheet" href="{% static 'ngRadar_Website/css/styleguide.css' %}">
  <link rel="stylesheet" href="{% static 'ngRadar_Website/css/style.css' %}">

  <!-- <link rel="stylesheet" href="../../static/ngRadar_Website/css/globals.css">
  <link rel="stylesheet" href="../../static/ngRadar_Website/css/styleguide.css">
  <link rel="stylesheet" href="../../static/ngRadar_Website/css/style.css"> -->

  <link rel="icon" type="image/x-icon" href="{% static 'ngRadar_Website/images/favicon/favicon.ico' %}">
  <!-- <link rel="icon" type="image/x-icon" href="/static/ngRadar_Website/images/favicon/favicon.ico"> -->
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'ngRadar_Website/images/favicon/apple-touch-icon.png' %}">
  <link rel="manifest" href="{% static 'ngRadar_Website/images/favicon/site.webmanifest' %}">
</head>

<!-- HTMX Engine Injection -->
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>

<body class="bg-light">
  <div class="dashboard-wrapper d-flex flex-column min-vh-100" data-color-mode="SDS-light">

    <header class="p-3 border-bottom d-flex align-items-center gap-3">
      <img class="logogroupcolor"
           src="{% static 'ngRadar_Website/images/logo.png' %}"
           alt="NSF, Associated Universities, Inc., and National Radio Astronomy Observatory logos"
           style="height: 60px; width: auto; object-fit: contain;" />
      <h1 class="text-wrapper-5 mb-0 fs-2">ngRadar System Communication Demo</h1>
    </header>


    {% block everywhere %}
     <!-- main row: left nav + right content -->
    <div class="d-flex flex-grow-1">
      <!-- LEFT NAV -->
        <nav class="p-3 border-end" style="min-width: 220px;" aria-label="Primary">
        <div class="d-grid gap-2">
            <button onclick="window.location.href='/index/'" class="btn btn-dark" type="button">
            Live Dashboard
            </button>
            <button onclick="window.location.href='/dashboard'" class="btn btn-dark" type="button">
            History
            </button>
            <button class="btn btn-dark" type="button">
            PRDX Files
            </button>
            <button class="btn btn-dark" type="button">
            TLEs
            </button>
            <button class="btn btn-dark" type="button">
            Plan Observation
            </button>
        </div>
        </nav>


      <!-- RIGHT CONTENT -->
      <main class="flex-grow-1">
        <div class="container mt-5">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
    {% endblock %}

    

    <div class="footer-padding" style="padding-top: 50px;"></div>
    <footer class="mt-auto py-3 text-center border-top bg-light">
      <p class="text-wrapper-7 mb-0">Developed by Cohort 1</p>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
          crossorigin="anonymous"></script>
</body>
</html>
