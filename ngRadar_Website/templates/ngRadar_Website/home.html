{% extends 'ngRadar_Website/base.html' %}

{% block title %}Live Dashboard{% endblock %}

{% block content %}

<div>
  <header class="text-center"> Current Time in UTC: <span id="live-clock"></span></header>
  <script>
          function getTime() {
              const now = new Date();
              //function will update the UI date and time using JS functionality
              // Extract UTC date and time components
              const year = now.getUTCFullYear();
              // Months are 0-indexed
              const month = String(now.getUTCMonth() + 1).padStart(2, '0');
              const day = String(now.getUTCDate()).padStart(2, '0');

              const hours = String(now.getUTCHours()).padStart(2, '0');
              const minutes = String(now.getUTCMinutes()).padStart(2, '0');
              const seconds = String(now.getUTCSeconds()).padStart(2, '0');

              // Assemble the formatted time
              const formattedTimestamp = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
              
              document.getElementById('live-clock').textContent = formattedTimestamp;
          
              //const timeString = now.toUTCString().substring(17,25);
              // document.getElementById('live-clock').innerText = timeString;//Original code, used AI to generate the formatting
          }
          // Update the clock immediately and refresh every 1000ms
          getTime();
          setInterval(getTime, 1000);
      </script>
</div>
