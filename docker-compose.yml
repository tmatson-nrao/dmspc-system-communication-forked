# ===========================================================================
# We use 1 Dockerfile and 1 docker-compose.yml file to build and 
# run the Django application in a containerized environment.
# If hosted locallly, it uses the local Postgres database. If in production, 
# it uses the Render-hosted Postgres database.
# ===========================================================================

services:
  ngradar_website:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
          condition: service_healthy
    volumes:
      - .:/service
      - ngrok_env:/out
    ports:
      - 8000:8000
    networks:
      - ngradar_website_network
    stdin_open: true
    tty: true

  postgres:
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=ngradar_website
      - POSTGRES_PASSWORD=ngradar_website
      - POSTGRES_DB=localdev
    networks:
      - ngradar_website_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngradar_website -d localdev"]
      interval: 5s
      timeout: 5s
      retries: 5

  staging_loader:
    build:
      context: .
      dockerfile: load-staging-data.Dockerfile
    env_file:
      - .env
    networks:
      - ngradar_website_network
    depends_on:
      - postgres
    volumes:
      - staging_dump:/dump
    profiles:
      - tools

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.1
    profiles: ["kafka"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ngradar_website_network

  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["kafka"]
    command: tcp broker:9092 --log stdout --authtoken ${NGROK_AUTH_TOKEN}
    ports:
      - "4040:4040"
    networks:
      - ngradar_website_network

  broker:
    user: "0:0"
    image: confluentinc/cp-kafka:7.5.1
    profiles: ["kafka"]
    depends_on:
      - zookeeper
      - ngrok
    volumes:
      - ngrok_env:/out
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: DOCKER://broker:29092, NGROK://broker:9092
      KAFKA_ADVERTISED_LISTENERS: DOCKER://broker:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER:PLAINTEXT,NGROK:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_MESSAGE_MAX_BYTES: 5000000
      KAFKA_REPLICA_FETCH_MAX_BYTES: 5000000
      KAFKA_MAX_REQUEST_SIZE: 5000000
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 5000000
      KAFKA_LOG_SEGMENT_BYTES: 1073741824 # Controls how much data can be written to the log segment at once

      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_LOG_RETENTION_MS: 604800000
    networks:
      - ngradar_website_network
    entrypoint: 
      - /bin/sh 
      - -c 
      - |
        echo "Waiting for ngrok tunnel to be created"
        while : ; do
          curl_status=$$(curl -s -o /dev/null -w %{http_code} http://ngrok:4040/api/tunnels/command_line)
          echo -e $$(date) "\tTunnels API HTTP state: " $$curl_status " (waiting for 200)"
          if [ $$curl_status -eq 200 ] ; then
            break
          fi
          sleep 5 
        done
        echo "ngrok tunnel is up"
        NGROK_LISTENER=$(curl -s  http://ngrok:4040/api/tunnels/command_line | grep -Po '"public_url":.*?[^\\]",' | cut -d':' -f2- | tr -d ',"' | sed 's/tcp:\/\//NGROK:\/\//g')
        echo $$NGROK_LISTENER
        export KAFKA_ADVERTISED_LISTENERS="$$KAFKA_ADVERTISED_LISTENERS, $$NGROK_LISTENER"
        echo "KAFKA_ADVERTISED_LISTENERS is set to " $$KAFKA_ADVERTISED_LISTENERS
        NGROK_BOOTSTRAP=$(curl -s  http://ngrok:4040/api/tunnels/command_line | grep -Po '"public_url":.*?[^\\]",' | cut -d':' -f2- | tr -d ',"' | sed 's/tcp:\/\///')
        echo "BOOTSTRAP_SERVER=$$NGROK_BOOTSTRAP" > /out/ngrok_endpoint.env
        /etc/confluent/docker/run
    # networks:
    #   - ngradar_website_network


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["kafka"]
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
    depends_on:
      - broker
    networks:
      - ngradar_website_network


  gbt:
    build: .
    # env_file:
    #   - .env
    depends_on:
      - postgres
      - broker
    volumes:
      - .:/service
      - ngrok_env:/out
    networks:
      - ngradar_website_network
    profiles: ["kafka"]
    entrypoint:
      - /bin/sh
      - -c
      - |
        rm -f /out/ngrok_endpoint.env
        echo "Finding ngrok endpoint..."
        while [ ! -f /out/ngrok_endpoint.env ]; do sleep 2; done
        while [ ! -s /out/ngrok_endpoint.env ]; do sleep 1; done
        echo "----- Using ngrok endpoint: -----"
        cat /out/ngrok_endpoint.env
        echo "------------------------------------"
        python manage.py gbt_sim


  seaweedfs:
    build: 
      context: .
      dockerfile: seaweed.Dockerfile
    ports:
      - "${FILER_PORT:-8888}:8888"
      - "${MASTER_PORT:-9333}:9333"
      - "${S3_PORT:-8333}:8333"
    volumes:
      - seaweed_data:/data
    networks:
      - ngradar_website_network
    env_file:
      - .env

  storage-ui:
    image: mastertinner/s3manager:latest
    platform: linux/amd64
    ports:
      - "${GUI_PORT:-3000}:8080" 
    environment:
      - ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-anykey}
      - SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-anysecret}
      - ENDPOINT=seaweedfs:8333 
      - USE_SSL=false
    networks:
      - ngradar_website_network



volumes:
  postgres_data:
  staging_dump:
  seaweed_data:
  ngrok_env:

networks:
  ngradar_website_network:
    driver: bridge